<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
		<script src="./public/admin-bundle.js" defer></script>
		<link rel="stylesheet" href="./public/bundle.css" />
		<title>Panel Admin — CineTrack</title>
	</head>
	<body>
		<nav class="nav-app">
			<div class="nav-app__izq">
				<a href="./index.html" class="nav-app__logo-wrap">
					<img src="./img/logo.png" alt="Logo" class="nav-app__logo" />
				</a>
				<ul class="nav-app__links">
					<li><a href="./index.html" class="nav-app__link">Inicio</a></li>
					<li><a href="./peliculas.html" class="nav-app__link">Películas</a></li>
					<li><a href="./listas.html" class="nav-app__link">Listas</a></li>
					<li><a href="./miembros.html" class="nav-app__link">Miembros</a></li>
				</ul>
			</div>
			<div class="nav-app__der" id="nav-auth"></div>
		</nav>

		<main class="admin">

			<div class="admin__cabecera">
				<p class="admin__eyebrow">Administración</p>
				<h1 class="admin__titulo">Panel de Control</h1>
			</div>

			<!-- ─── Estadísticas globales ─────────────────────── -->
			<section class="admin__seccion">
				<p class="admin__seccion-titulo">Estadísticas globales</p>
				<div class="admin__stats-grid">
					<div class="admin__stat-card">
						<span class="admin__stat-num" id="stat-usuarios">—</span>
						<span class="admin__stat-label">Usuarios</span>
					</div>
					<div class="admin__stat-card">
						<span class="admin__stat-num" id="stat-favoritos">—</span>
						<span class="admin__stat-label">Favoritos</span>
					</div>
					<div class="admin__stat-card">
						<span class="admin__stat-num" id="stat-resenas">—</span>
						<span class="admin__stat-label">Reseñas</span>
					</div>
					<div class="admin__stat-card">
						<span class="admin__stat-num" id="stat-historial">—</span>
						<span class="admin__stat-label">Vistas</span>
					</div>
				</div>
			</section>

			<!-- ─── Gestión de usuarios ──────────────────────── -->
			<section class="admin__seccion">
				<p class="admin__seccion-titulo">Gestión de usuarios</p>
				<div class="admin__tabla-wrap">
					<table class="admin__tabla">
						<thead>
							<tr>
								<th>ID</th>
								<th>Nombre</th>
								<th>Email</th>
								<th>Rol</th>
								<th>Estado</th>
								<th>Registro</th>
								<th>Acciones</th>
							</tr>
						</thead>
						<tbody id="usuarios-tbody">
							<tr><td colspan="7" class="admin__vacio">Cargando...</td></tr>
						</tbody>
					</table>
				</div>
			</section>

		</main>
	</body>
</html>
